version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_MODEL=llama2
      - OLLAMA_API_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///./book_planner.db
      - CONTEXT_WINDOW=4096
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - ollama
    networks:
      - book-series-network
    command: python run.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - book-series-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - book-series-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  ollama_data:

networks:
  book-series-network:
    driver: bridge
